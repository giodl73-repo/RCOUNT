name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust
    runs-on: windows-latest

    steps:
      - name: Use canonical line endings
        run: git config --global core.autocrlf false

      - name: Check out RCOUNT
        uses: actions/checkout@v4
        with:
          path: RCOUNT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: RCOUNT
        run: cargo fmt -- --check

      - name: Test workspace
        working-directory: RCOUNT
        run: cargo test --workspace

      - name: Smoke CLI
        working-directory: RCOUNT
        run: cargo run -p rcount-cli -- --help

